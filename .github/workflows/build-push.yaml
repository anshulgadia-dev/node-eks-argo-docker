name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/node-app:v1
            ${{ secrets.DOCKER_USERNAME }}/node-app:${{ github.sha }}

      - name: Update Deployment Image with SHA
        run: |
          sed -i "s|image: .*/node-app:.*|image: ${{ secrets.DOCKER_USERNAME }}/node-app:${{ github.sha }}|g" k8s/deployment.yaml
          cat k8s/deployment.yaml

      - name: Commit and Push Updated Deployment
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add k8s/deployment.yaml
          git commit -m "Update image tag to ${{ github.sha }}" || echo "No changes to commit"
          git push

      - name: Trigger ArgoCD Sync (Optional)
        run: |
          echo "Docker image pushed: ${{ secrets.DOCKER_USERNAME }}/node-app:${{ github.sha }}"
          echo "ArgoCD will automatically sync from git repository"
