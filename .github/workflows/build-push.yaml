name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/node-app:v1
            ${{ secrets.DOCKER_USERNAME }}/node-app:${{ github.sha }}

      - name: Trigger ArgoCD Sync (Optional)
        run: |
          echo "Docker image pushed: ${{ secrets.DOCKER_USERNAME }}/node-app:${{ github.sha }}"
          echo "ArgoCD will automatically sync from git repository"
