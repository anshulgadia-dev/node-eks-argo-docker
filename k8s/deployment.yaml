apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      labels:
        app: node-app
    spec:
      containers:
        - name: node-app
          image: anshulgadia26/node-app:7b3f2707794965d0e5479a7ec2e5c6092faeb4ae
          ports:
            - containerPort: 3000
