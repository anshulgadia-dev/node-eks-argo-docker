apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      labels:
        app: node-app
    spec:
      containers:
        - name: node-app
          image: anshulgadia26/node-app:3513729c8baaf976ff19ffb918dd81aac8cd971a
          ports:
            - containerPort: 3000
