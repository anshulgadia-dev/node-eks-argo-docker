apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      labels:
        app: node-app
    spec:
      containers:
        - name: node-app
          image: anshulgadia26/node-app:86642717df2968e1ec1438c130d13ea26e9f2d69
          ports:
            - containerPort: 3000
